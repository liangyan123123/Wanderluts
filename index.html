<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的简单分享页</title>
    <!-- 仅保留最基础的样式，保证可读性 -->
    <style>
        body {
            font-family: Arial, 宋体;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .content {
            margin-top: 30px;
            line-height: 1.8;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>欢迎来到我的网页</h1>
    <div class="content">
        <p>这是一个可以分享给朋友的简单网页！</p>
        <p>你可以在这里写任何想分享的内容：</p>
        <ul>
            <li>我的爱好：读书、看电影、运动</li>
            <li>我的小目标：学会制作并分享网页</li>
            <li>想说的话：简单的网页也能传递快乐 😊</li>
        </ul>
    </div>
</body>
</html>
