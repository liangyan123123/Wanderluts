<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的简单分享页</title>
    <style>
        body {
            font-family: Arial, 宋体;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center; /* 让图片居中 */
        }
        h1 {
            color: #333;
        }
        .content {
            margin-top: 30px;
            line-height: 1.8;
            color: #555;
            text-align: left; /* 文字左对齐 */
        }
        /* 给图片加一点样式 */
        .my-photo {
            width: 200px; /* 控制图片宽度 */
            border-radius: 8px; /* 圆角 */
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>欢迎来到我的网页</h1>
    <!-- 插入图片，src 填你的图片文件名 -->
    <img src="first day.png" alt="我的照片" class="my-photo">
    <div class="content">
        <p>这是一个可以分享给朋友的简单网页！</p>
        <ul>
            <li>我的爱好：读书、看电影、运动</li>
            <li>我的小目标：学会制作并分享网页</li>
        </ul>
    </div>
</body>
</html>
